services:
  echo-a:
    image: mendhak/http-https-echo:37
    hostname: echo-a
    networks:
      default:
        aliases: [echo-a.internal]

  echo-b:
    image: mendhak/http-https-echo:37
    hostname: echo-b
    networks:
      default:
        aliases: [echo-b.internal]

  echo-default:
    image: mendhak/http-https-echo:37
    hostname: echo-default
    networks:
      default:
        aliases: [default-backend.internal]

  kong:
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /e2e/kong.yml
      KONG_PLUGINS: bundled,dynamic-upstream
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: notice
    volumes:
      - ./kong.yml:/e2e/kong.yml:ro
      - ../plugins/dynamic-upstream/kong/plugins/dynamic-upstream:/usr/local/share/lua/5.1/kong/plugins/dynamic-upstream:ro
    ports:
      - "18000:8000"
    depends_on: [echo-a, echo-b, echo-default]
